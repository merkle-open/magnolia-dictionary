class: info.magnolia.ui.contentapp.configuration.ContentAppDescriptor
appClass: info.magnolia.ui.framework.app.BaseApp

datasource: &dictionaryDatasource
  $type: jcrDatasource
  workspace: dictionary
  allowedNodeTypes:
    - mgnl:label
    - mgnl:siteSpecificLabel

subApps:
  browser:
    class: info.magnolia.ui.contentapp.configuration.BrowserDescriptor
    actions:
      exportLabels:
        icon: icon-export
        class: com.merkle.oss.magnolia.dictionary.actions.importexport.XlsExportAction$Definition
        availability:
          multiple: true
          root: true
          nodeTypes:
            - mgnl:label
      importLabels:
        icon: icon-import
        $type: openDialogAction
        dialogId: magnolia-dictionary:importXlsDialog
        availability:
          root: true
          writePermissionRequired: true
      addSiteSpecificLabel:
        icon: icon-app
        $type: openDialogAction
        dialogId: magnolia-dictionary:siteSelectionDialog
        availability:
          root: false
          writePermissionRequired: true
          nodeTypes:
            - mgnl:label
      editLabel:
        class: com.merkle.oss.magnolia.dictionary.actions.label.EditLabelAction$Definition
      publish:
        icon: icon-publish
        $type: jcrCommandAction
        command: publish
        asynchronous: true
        params:
          recursive: true
        availability:
          root: true
          writePermissionRequired: true
          rules:
            notDeleted: &notDeleted
              $type: jcrIsDeletedRule
              negate: true
            isPublishable:
              $type: jcrPublishableRule
              name: isPublishable
      unpublish:
        icon: icon-unpublish
        $type: jcrCommandAction
        command: unpublish
        availability:
          root: true
          writePermissionRequired: true
          rules:
            notDeleted: *notDeleted
            isPublished:
              $type: jcrPublishedRule
              name: isPublished
      deleteAllExpired:
        icon: icon-delete
        class: com.merkle.oss.magnolia.dictionary.actions.delete.DeleteAllExpiredLabels$Definition
        availability:
          root: true
          writePermissionRequired: true
      deleteExpired:
        icon: icon-delete
        class: com.merkle.oss.magnolia.dictionary.actions.delete.DeleteExpiredLabel$Definition
        availability:
          writePermissionRequired: true
          multiple: true
          nodeTypes:
            - mgnl:label
    actionbar:
      defaultAction: editLabel
      sections:
        - name: label
          groups:
            - name: editActions
              items:
                - name: addSiteSpecificLabel
                - name: editLabel
                - name: deleteExpired
            - name: importexport
              items:
                - name: exportLabels
            - name: publishActions
              items:
                - name: publish
                - name: unpublish
          availability:
            nodeTypes:
              - mgnl:label
              - mgnl:siteSpecificLabel
        - name: root
          groups:
            - name: importexport
              items:
                - name: exportLabels
                - name: importLabels
            - name: dictionary
              items:
                - name: publish
                - name: deleteAllExpired
          availability:
            root: true

    workbench:
      # see info.magnolia.ui.contentapp.JcrDataProvider
      filters:
        - name: site
          icon: icon-app
          filterOperator: CONTAINS
          $type: dropdownMultiselect
          datasource:
            $type: siteOptionDatasource
            includeGeneric: true
      contentViews:
        - name: tree
          multiSelect: true
          $type: treeView
          rowStyleGenerator: info.magnolia.ui.contentapp.row.StatusRowStyleGenerator
          columns:
            jcrName:
              class: com.merkle.oss.magnolia.dictionary.workbench.column.TitleColumnDefinition
            value:
              class: info.magnolia.ui.contentapp.configuration.column.ConfiguredColumnDefinition
              valueProvider: com.merkle.oss.magnolia.dictionary.workbench.column.LabelNodeColumnValueProvider
              editable: false
            multi:
              class: info.magnolia.ui.contentapp.configuration.column.ConfiguredColumnDefinition
              valueProvider: com.merkle.oss.magnolia.dictionary.workbench.column.MultiColumnValueProvider
              editable: false
            expired:
              class: info.magnolia.ui.contentapp.configuration.column.ConfiguredColumnDefinition
              valueProvider: com.merkle.oss.magnolia.dictionary.workbench.column.ExpiredColumnValueProvider
              editable: false
            jcrPublishingStatus:
              $type: jcrStatusColumn
              width: 130
            mgnl:lastModified:
              $type: dateColumn
              editable: false
              width: 200

  detail:
    class: info.magnolia.ui.contentapp.detail.DetailDescriptor
    itemProvider:
      class: com.merkle.oss.magnolia.dictionary.field.LabelJcrNodeFromLocationProvider$Definition
    datasource:
      <<: *dictionaryDatasource
      describeByProperty: jcrName
    form:
      properties:
        composite:
          $type: compositeField
          label: ""
          itemProvider:
            class: com.merkle.oss.magnolia.dictionary.field.LabelJcrNodeProvider$Definition
          properties:
            name:
              $type: textField
              readOnly: true
            value:
              $type: textField
              readOnly: true
        site:
          $type: hiddenField
        multi:
          class: com.merkle.oss.magnolia.dictionary.field.TranslationsTextFieldDefinition
    actions:
      commit:
        class: com.merkle.oss.magnolia.dictionary.actions.label.EditLabelSaveAction$Definition
      cancel:
        $type: closeAction
